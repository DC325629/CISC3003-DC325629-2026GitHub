<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Crispy College Meals</title>
    <link rel="shortcut icon" href="./assets/images/favicon.svg" type="image/svg+xml">
    <link href="https://fonts.googleapis.com/css2?family=Forum&family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./assets/css/style.css">
    <link rel="stylesheet" href="./assets/css/auth.css">
</head>
<body>
    <!-- Header -->
    <header class="header" data-header>
        <div class="container">
            <a href="cisc3003-TeamAssgn.html" class="logo">
                <img src="./assets/images/logo.svg" width="130" height="45" alt="Crispy home">
            </a>
            <nav class="navbar" data-navbar>
                <button class="nav-close-btn" aria-label="close menu" data-nav-toggler>
                    <ion-icon name="close-outline" aria-hidden="true"></ion-icon>
                </button>
                <a href="cisc3003-TeamAssgn.html" class="nav-logo">
                    <img src="./assets/images/logo.svg" width="175" height="61" alt="Crispy home">
                </a>
                <ul class="navbar-list">
                    <li class="navbar-item"><a href="cisc3003-TeamAssgn.html" class="navbar-link">Home</a></li>
                    <li class="navbar-item"><a href="cisc3003-TeamAssgn.html#menu" class="navbar-link">Menu</a></li>
                    <li class="navbar-item"><a href="cisc3003-TeamAssgn.html#schedule" class="navbar-link">Hours</a></li>
                    <li class="navbar-item"><a href="checkout.html" class="navbar-link">Checkout</a></li>
                    <li class="navbar-item"><a href="order-details.html" class="navbar-link">Orders</a></li>
                </ul>
            </nav>
            <div class="header-action">
                <a href="tel:00012345689" class="call">
                    <ion-icon name="call-outline" aria-hidden="true"></ion-icon>
                    <span class="span">000 (123) 456 89</span>
                </a>
                <a href="checkout.html" class="btn">
                    <span class="span">Start Checkout</span>
                    <ion-icon name="arrow-forward" aria-hidden="true"></ion-icon>
                </a>
            </div>
            <button class="nav-open-btn" aria-label="open menu" data-nav-toggler>
                <ion-icon name="menu-outline" aria-hidden="true"></ion-icon>
            </button>
            <div class="overlay" data-overlay data-nav-toggler></div>
        </div>
    </header>

    <main>
        <div class="auth-container">
            <h1 class="auth-title">Login</h1>
            <div id="error-msg" class="error-msg" style="display: none;"></div>
            
            <form id="login-form">
			    <div class="form-group">
			        <input type="email" id="email" name="email" placeholder="Email" required>
			    </div>
			    <div class="form-group">
			        <input type="password" id="password" name="password" placeholder="Password" required>
			    </div>
			    <div class="forgot-password-link" style="text-align: right; margin-top: 10px; margin-bottom: 20px;">
			        <a href="forgot-password.html" style="color: #d49b3a; font-size: 1.25rem;">Forgot Password?</a>
			    </div>
			    <button type="submit" class="btn-auth">Login</button>
			</form>
            
            <div class="auth-link">
                Don't have an account? <a href="register.html">Register now</a>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="section footer-top">
            <div class="container">
                <div class="footer-brand">
                    <a href="cisc3003-TeamAssgn.html" class="logo">
                        <img src="./assets/images/logo.svg" width="170" height="61" loading="lazy" alt="Crispy home">
                    </a>
                    <p class="footer-text">Sit amet consectetur adipiscing elitsue risus mauris adipis</p>
                </div>
            </div>
        </div>
        <div class="footer-bottom">
            <div class="container">
                <p class="copyright text-center">&copy; 2023 codewithsadee, All Rights Reserved</p>
            </div>
        </div>
    </footer>

    <a href="#top" class="back-top-btn" aria-label="back to top" data-back-top-btn>
        <ion-icon name="chevron-up" aria-hidden="true"></ion-icon>
    </a>

    <script src="./assets/js/script.js"></script>
    <script type="module" src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.js"></script>

    <script>
        const loginForm = document.getElementById('login-form');
        const errorDiv = document.getElementById('error-msg');

        loginForm.addEventListener('submit', function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            const users = JSON.parse(localStorage.getItem('users') || '[]');
            const user = users.find(u => u.email === email && u.password === password);
            
            if (user) {
                localStorage.setItem('currentUser', JSON.stringify({
                    id: user.id,
                    email: user.email,
                    full_name: user.full_name,
                    phone: user.phone
                }));
                window.location.href = 'cisc3003-TeamAssgn.html';
            } else {
                errorDiv.style.display = 'block';
                errorDiv.textContent = 'Invalid email or password';
            }
        });
    </script>
</body>
</html>
