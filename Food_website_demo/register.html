    <link rel="stylesheet" href="./assets/css/style.css">
    <link rel="stylesheet" href="./assets/css/auth.css">
</head>
<body>
    <!-- Header -->

            <a href="cisc3003-TeamAssgn.html" class="logo">

                </a>
                <ul class="navbar-list">
                    <li class="navbar-item"><a href="cisc3003-TeamAssgn.html" class="navbar-link">Home</a></li>
                    <li class="navbar-item"><a href="cisc3003-TeamAssgn.html#menu" class="navbar-link">Menu</a></li>
                    <li class="navbar-item"><a href="cisc3003-TeamAssgn.html#schedule" class="navbar-link">Hours</a></li>

            <div class="header-action">

    <main>
        <div class="auth-container">
            <h1 class="auth-title">Register</h1>
            <div id="error-msg" class="error-msg" style="display: none;"></div>
            <div id="success-msg" class="success-msg" style="display: none;"></div>
            
            <form id="register-form">
                <div class="form-group">
                    <input type="text" id="full_name" name="full_name" placeholder="Full Name *" required>
                </div>
                
                <div class="form-group">
                    <input type="email" id="email" name="email" placeholder="Email *" required>
                </div>
                
                <div class="form-group">
                    <input type="tel" id="phone" name="phone" placeholder="Phone (Optional)">
                </div>
                
                <div class="form-group">
                    <input type="password" id="password" name="password" placeholder="Password (min 6 chars) *" required>
                </div>
                
                <div class="form-group">
                    <input type="password" id="confirm_password" name="confirm_password" placeholder="Confirm Password *" required>
                </div>
                
                <button type="submit" class="btn-auth-register-page">Register</button>
            </form>
            
            <div class="auth-link">
                Already have an account? <a href="login.html">Login here</a>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="section footer-top">

                    <a href="cisc3003-TeamAssgn.html" class="logo">

            </div>

            </div>
        </div>
    </footer>

    <a href="#top" class="back-top-btn" aria-label="back to top" data-back-top-btn>
        <ion-icon name="chevron-up" aria-hidden="true"></ion-icon>
    </a>

    <script src="./assets/js/script.js"></script>
    <script type="module" src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.js"></script>

    <script>
        const registerForm = document.getElementById('register-form');
        const errorDiv = document.getElementById('error-msg');
        const successDiv = document.getElementById('success-msg');

        registerForm.addEventListener('submit', function(e) {
            e.preventDefault();
            
            errorDiv.style.display = 'none';
            successDiv.style.display = 'none';
            
            const full_name = document.getElementById('full_name').value.trim();
            const email = document.getElementById('email').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const password = document.getElementById('password').value;
            const confirm_password = document.getElementById('confirm_password').value;
            
            if (!full_name) {
                errorDiv.textContent = 'Please enter your name';
                errorDiv.style.display = 'block';
                return;
            }
            
            if (!email) {
                errorDiv.textContent = 'Please enter your email';
                errorDiv.style.display = 'block';
                return;
            }
            
            if (!email.includes('@')) {
                errorDiv.textContent = 'Please enter a valid email address';
                errorDiv.style.display = 'block';
                return;
            }
            
            if (!password) {
                errorDiv.textContent = 'Please enter a password';
                errorDiv.style.display = 'block';
                return;
            }
            
            if (password.length < 6) {
                errorDiv.textContent = 'Password must be at least 6 characters';
                errorDiv.style.display = 'block';
                return;
            }
            
            if (password !== confirm_password) {
                errorDiv.textContent = 'Passwords do not match';
                errorDiv.style.display = 'block';
                return;
            }
            
            const users = JSON.parse(localStorage.getItem('users') || '[]');
            const existingUser = users.find(u => u.email === email);
            
            if (existingUser) {
                errorDiv.textContent = 'This email is already registered. Please login instead.';
                errorDiv.style.display = 'block';
                return;
            }
            
            const newUser = {
                id: Date.now(),
                full_name: full_name,
                email: email,
                phone: phone,
                password: password,
                created_at: new Date().toISOString()
            };
            
            users.push(newUser);
            localStorage.setItem('users', JSON.stringify(users));
            
            successDiv.textContent = 'Registration successful! Redirecting to login...';
            successDiv.style.display = 'block';
            
            setTimeout(() => {
                window.location.href = 'login.html';
            }, 2000);
        });
    </script>
</body>
</html>
